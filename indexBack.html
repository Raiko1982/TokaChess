<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokaChess | Encuentra todos los torneos de ajedrez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
    <link rel="stylesheet" href="./styles.css">	
</head>
<body>

    <header class="header-nav">
        <div class="logo-group">
            <a href="index.html" class="logo-link">
                <img src="./logo.jpg" title="logo" alt="logo" height="50"/>
                <h1 class="logo-text">Toka<span class="logo-accent">Chess</span></h1>
            </a>
            <span class="slogan" data-i18n="hero_message">Encuentra todos los torneos de ajedrez</span>
        </div>
        <select id="langSelect" class="form-select form-select-sm" style="width: 110px;">
            <option value="es">Español</option>
            <option value="en">English</option>
        </select>
    </header>

    <div id="app">
        <div id="map"></div>
        <aside id="sidebar">
            <button id="toggleSidebar">◀</button>
            <div class="sidebar-content">
                <div class="mb-3">
                    <label class="form-label" data-i18n="search_label">Localización</label>
                    <div class="input-group input-group-sm">
                        <input id="buscarCiudad" class="form-control" placeholder="Ej: Madrid">
                        <button id="btnBuscar" class="btn btn-primary">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!--<div class="mb-3">
                    <label class="form-label" data-i18n="near_label">Radio</label>
                    <div class="d-flex gap-2">
                        <select id="radioDistancia" class="form-select">
                            <option value="15">15 km</option>
                            <option value="50">50 km</option>
                        </select>
                        <button id="btnLocate" class="btn btn-locate w-100" data-i18n="btn_locate">Mi ubicación</button>
                    </div>
                </div> -->
                <div class="mb-3">
                    <label class="form-label" data-i18n="date_label">Rango de fechas</label> 
                    <input type="date" id="fechaInicio" class="form-control mb-1"> 
                    <input type="date" id="fechaFin" class="form-control mb-2">
                    <button id="btnFiltrar" class="btn btn-primary btn-sm w-100">Filtrar</button>
                </div>
                <hr>
                <button id="btnReset" class="btn btn-link btn-sm w-100">Limpiar todo</button>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="./main.js"></script>
</body>
</html>
