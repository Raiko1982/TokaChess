name: Ejecutar mi script de Python

on:
  workflow_dispatch: # Esto permite que tú le des al botón de "Play" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 geopy python-dateutil
        
      - name: Ejecutar el script
        run: python procesos/procesoChessResult.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name "TokaChess Bot"
          git config --global user.email "bot@tokachess.com"
          git add torneos.json
          git commit -m "Actualización automática de torneos" || echo "No hay cambios que guardar"
          git push
