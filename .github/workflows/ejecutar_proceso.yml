name: Ejecutar mi script de Python

on:
  workflow_dispatch: # Esto permite que tú le des al botón de "Play" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar el script
        run: python procesoInfo64.py
