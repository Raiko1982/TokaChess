<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WVHMCX8M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Abrir menú">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
    </button>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="alert alert-secondary mt-5 mb-1 text-center" role="info">
            <div>
                <a href="index.html" class="logo-link">
                    <img src="./logo-small.png" title="logo" alt="logo" height="100" />
                    <h1 class="logo-text">Toka<span class="logo-accent">Chess</span></h1>
                </a>
            </div>
            <p class="mt-1 mb-0">¿Toca ajedrez?</p>
            <p class="mb-2">¡Encuentra un torneo y diviertete! </p>
        </div>
        <div class="alert alert-secondary"  role="info">
            <div class="text-center mb-2 border-bottom border-dark pb-2">
                <h6 class="text-uppercase fw-bold mb-1" style="letter-spacing: 2px; font-size: 0.85rem; color: #fff;">
                    <i class="bi bi-sliders2 me-2"></i>Filtro de Torneos
                </h6>
                <p class="text-muted small mb-0" style="font-size: 0.65rem;">
                    Ajusta los parámetros para tu búsqueda
                </p>
            </div>
            <div class="mb-2">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold"
                    style="letter-spacing: 1px; font-size: 0.7rem;">Nombre del torneo </label>
                <input type="text" id="nombreFilter" placeholder="ej: blitz" class="form-control form-control-custom w-100">
            </div>
            <div class="mb-2">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold"
                    style="letter-spacing: 1px; font-size: 0.7rem;">Fecha del torneo desde... </label>
                <input type="text" placeholder="Selecciona fecha de inicio"   onfocus="(this.type='date')"  onblur="if(!this.value)this.type='text'" id="dateInitFilter" placeholder="fecha inicio" class="form-control form-control-custom w-100">
            </div>
            <div class="mb-2">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.7rem;">Fecha del torneo hasta... </label>
                <input type="text" placeholder="Selecciona fecha de fin"  onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" id="dateEndFilter" placeholder="fecha inicio" class="form-control form-control-custom w-100">
            </div>
           <div class="mb-3 position-relative">
                  <label class="small text-muted mb-2 d-block text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.7rem;">
                        Ciudad <span class="fw-normal text-lowercase opacity-75" style="font-size: 0.6rem; font-style: italic;">
                                    (hasta 100kms a la redonda)
                                </span>
                    </label>
               <!--  <div class="input-group mb-3">                   -->
                    <input type="text" id="cityFilter" placeholder="Busca una ciudad..." class="form-control form-control-custom w-100" autocomplete="off">
               <!--      <select id="radioFilter" class="form-select form-control-custom">
                        <option selected></option>
                        <option value="5">5km</option>
                        <option value="10">10km</option>
                        <option value="30">30km</option>
                        <option value="50">50km</option>
                        <option value="100">100km</option>
                    </select>      -->
                    <div id="citySuggestions" class="list-group position-absolute w-100 shadow-sm d-none" style="z-index: 1050; max-height: 200px; overflow-y: auto;"></div>
             </div>                     
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-premium " id="btnFiltrar" style="width: 65%;">
                    Filtrar
                </button>                
                <button class="btn btn-sm btn-link text-decoration-none text-muted p-0" id="btnLimpiar" title="Limpiar filtros">
                     <i class="bi bi-x-circle"></i> limpiar
                </button>
            </div>
             </div> 
    </div>
        <div class="mt-auto opacity-50 small text-center pt-3 border-top border-secondary">

            <a href="https://github.com/Raiko1982/" target="_blank" class="github-link">
                <svg class="github-icon" height="16" viewBox="0 0 16 16" width="16">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
                <span>Raiko1982</span>
            </a>

        </div>
    </aside>
    <div id="map-container" style="position: relative;">

    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button id="btn-view-map" class="btn btn-primary d-flex align-items-center gap-2 shadow" onclick="switchView('map')">
            <i class="bi bi-map-fill"></i> 
            <span>Mapa</span>
        </button>
        <button id="btn-view-table" class="btn btn-light d-flex align-items-center gap-2 shadow" onclick="switchView('table')">
            <i class="bi bi-layout-three-columns"></i> 
            <span>Tabla</span>
        </button>
    </div>

        <div id="map" style="height: 100vh; width: 100%;"></div>

        <div id="table-view" class="d-none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; overflow-y: auto; padding: 80px 20px 20px 20px; background: #d4dadc;">
            <div class="table-responsive">
            <div class="card border-secondary">
                <table class="table table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Origen</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                            <th>Torneo</th>
                             <th>Ritmo</th>
                            <th>Organizador</th>
                            <th>Ciudad</th>                            
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        
                    </tbody>
                </table>
            </div>
            </div>
        </div>

    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="./main.js"></script>
