<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TocaChess | Buscador de Torneos Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    
    <style>
        :root {
            --primary: #0062ff;
            --primary-soft: #eef4ff;
            --dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 10px;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #fff; }
        
        /* NAVBAR ESTILIZADA */
        .header-nav {
            height: 65px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            position: relative;
            z-index: 1100;
        }

        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-size: 1.4rem; font-weight: 850; letter-spacing: -0.8px; color: var(--dark); margin: 0; line-height: 1; }
        .logo-accent { color: var(--primary); }

        /* ESLOGAN ESTILIZADO */
        .slogan {
            font-size: 0.85rem;
            color: var(--text-muted);
            border-left: 2px solid var(--border);
            padding-left: 15px;
            margin-left: 5px;
            font-weight: 500;
        }

        #app { display: flex; height: calc(100vh - 65px); width: 100vw; position: relative; }

        /* SIDEBAR COMPACTO */
        #sidebar {
            width: 270px; height: 100%; background: #fff; 
            border-right: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; position: absolute; left: 0; top: 0;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }
        #sidebar.collapsed { transform: translateX(-270px); }

        .sidebar-content { width: 270px; padding: 1.5rem; box-sizing: border-box; overflow-y: auto; height: 100%; }

        /* BOTÓN TOGGLE */
        #toggleSidebar {
            position: absolute; left: 270px; top: 15px; width: 24px; height: 36px;
            border-radius: 0 8px 8px 0; border: 1px solid var(--border); border-left: none;
            background: #fff; color: var(--dark); display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 1100;
            font-size: 10px; transition: all 0.2s ease;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }
        #toggleSidebar:hover { color: var(--primary); width: 30px; }
        #sidebar.collapsed #toggleSidebar { left: 270px; }

        /* FORMULARIOS Y BOTONES COMPACTOS */
        .form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.8px; margin-bottom: 6px; }
        
        .form-control, .form-select {
            border: 1px solid var(--border); background: #f8fafc;
            border-radius: var(--radius); padding: 8px 12px; font-size: 0.85rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); background: #fff; outline: none; }

        .btn { border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; padding: 8px 12px; transition: all 0.2s; }
        .btn-primary { background: var(--primary); border: none; }
        
        .btn-locate { background: var(--primary-soft); color: var(--primary); border: 1px solid transparent; }
        .btn-locate:hover { border-color: var(--primary); background: #fff; }

        /* MAPA */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; background: #f1f3f5; }

        /* RESPONSIVE: Esconder eslogan en móviles muy pequeños */
        @media (max-width: 768px) { .slogan { display: none; } }
    </style>
</head>
<body>

<header class="header-nav">
    <div class="logo-group">
        <svg width="36" height="36" viewBox="0 0 100 100" style="border-radius: 8px; border: 1px solid var(--border);">
            <rect x="0" y="0" width="50" height="50" fill="#fff"/>
            <rect x="50" y="0" width="50" height="50" fill="var(--primary)"/>
            <rect x="0" y="50" width="50" height="50" fill="var(--primary)"/>
            <rect x="50" y="50" width="50" height="50" fill="#fff"/>
            
            <path d="M50 20 L30 80 L70 80 Z" fill="#fff" stroke="var(--dark)" stroke-width="3" stroke-linejoin="round"/>
            <circle cx="50" cy="35" r="10" fill="#fff" stroke="var(--dark)" stroke-width="3"/>
            <circle cx="50" cy="50" r="4" fill="var(--primary)"/>
        </svg>
        <h1 class="logo-text">Toca<span class="logo-accent">Chess</span></h1>
        <span class="slogan" data-i18n="hero_message">Encuentra todos los torneos de ajedrez</span>
    </div>
    
    <select id="langSelect" class="form-select form-select-sm" style="width: 100px; font-size: 0.8rem;" onchange="cambiarIdioma()">
        <option value="es">Español</option>
        <option value="en">English</option>
    </select>
</header>

<div id="app">
    <div id="map"></div>

    <aside id="sidebar">
        <button id="toggleSidebar" onclick="toggleSidebar()">◀</button>
        <div class="sidebar-content">
            
            <div class="mb-3">
                <label class="form-label" data-i18n="search_label">Localización</label>
                <div class="input-group input-group-sm">
                    <input id="buscarCiudad" class="form-control" data-i18n-placeholder="search_placeholder">
                    <button class="btn btn-primary px-3" onclick="buscarCiudad()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" data-i18n="near_label">Radio de búsqueda</label>
                <div class="d-flex gap-2">
                    <select id="radioDistancia" class="form-select" style="width: 80px;">
                        <option value="5">5 km</option>
                        <option value="15" selected>15 km</option>
                        <option value="50">50 km</option>
                    </select>
                    <button class="btn btn-locate btn-sm w-100" onclick="filtrarPorPosicion()" data-i18n="btn_locate">Mi ubicación</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" data-i18n="date_label">Rango de fechas</label>
                <input type="date" id="fechaInicio" class="form-control mb-1">
                <input type="date" id="fechaFin" class="form-control mb-2">
                <button class="btn btn-primary btn-sm w-100" onclick="aplicarFiltros()" data-i18n="btn_filter">Filtrar</button>
            </div>

            <hr style="opacity: 0.1; margin: 20px 0;">
            
            <button class="btn btn-link btn-sm w-100 mt-3 text-decoration-none text-muted" style="font-size: 0.8rem" onclick="resetearFiltros()" data-i18n="btn_reset">Limpiar todos los filtros</button>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const i18n = {
        es: {
            search_label: "Buscador", search_placeholder: "Ciudad...",
            near_label: "Radio", btn_locate: "Cerca de mí",
            date_label: "Fechas", btn_filter: "Aplicar filtro",
            btn_reset: "Ver todos", hero_message: "Encuentra todos los torneos de ajedrez"
        },
        en: {
            search_label: "Search", search_placeholder: "City...",
            near_label: "Radius", btn_locate: "Near me",
            date_label: "Dates", btn_filter: "Filter range",
            btn_reset: "Clear all", hero_message: "Find all chess tournaments"
        }
    };

    let map;
    
    function init() {
        map = L.map('map', { zoomControl: false }).setView([40.41, -3.70], 6);
        // Usamos la capa estándar de OSM para más contraste
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.control.zoom({ position: 'topright' }).addTo(map);
        setTimeout(() => map.invalidateSize(), 500);
    }

    function cambiarIdioma() {
        const lang = document.getElementById('langSelect').value;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = i18n[lang][el.getAttribute('data-i18n')];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')];
        });
    }

    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("collapsed");
        document.getElementById("toggleSidebar").innerText = sidebar.classList.contains("collapsed") ? "▶" : "◀";
        setTimeout(() => map.invalidateSize(), 400);
    }

    function buscarCiudad() {
        let ciudad = document.getElementById("buscarCiudad").value;
        if(!ciudad) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${ciudad}`)
            .then(r => r.json()).then(data => {
                if(data.length) map.setView([data[0].lat, data[0].lon], 12);
            });
    }

    // Inicializar todo
    init();
</script>
</body>
</html>
