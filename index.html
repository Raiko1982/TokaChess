<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokaChess | Encuentra todos los torneos de ajedrez</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./tokaChess.css">
</head>

<body>

    <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Abrir menú">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
    </button>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="alert alert-secondary mt-5 mb-2 text-center" role="info">
            <div>
                <a href="index.html" class="logo-link">
                    <img src="./logo-small.png" title="logo" alt="logo" height="100" />
                    <h1 class="logo-text">Toka<span class="logo-accent">Chess</span></h1>
                </a>
            </div>
            <p class="mt-1 mb-0">¿Toca ajedrez?</p>
            <p class="mb-2">¡Encuentra un torneo y diviertete! </p>

        </div>
        <div class="alert alert-secondary"  role="info">
            <div class="mb-2">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold"
                    style="letter-spacing: 1px; font-size: 0.7rem;">Nombre del torneo </label>
                <input type="text" id="nombreFilter" class="form-control form-control-custom w-100">
            </div>
            <div class="mb-2">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold"
                    style="letter-spacing: 1px; font-size: 0.7rem;">Fecha del torneo desde... </label>
                <input type="date" id="dateInitFilter" class="form-control form-control-custom w-100">
            </div>
            <div class="mb-3">
                <label class="small text-muted mb-2 d-block text-uppercase fw-bold"
                    style="letter-spacing: 1px; font-size: 0.7rem;">Fecha del torneo hasta... </label>
                <input type="date" id="dateEndFilter" class="form-control form-control-custom w-100">
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-premium" id="btnFiltrar" onclick="aplicarFiltros()">
                    Filtrar
                </button>
                <button class="btn btn-sm btn-link text-decoration-none text-muted" id="btnLimpiar" onclick="limpiarFiltros()">
                    <i class="bi bi-x-circle"></i> Limpiar filtros
                </button>
            </div>
    </div>
        <div class="mt-auto opacity-50 small text-center pt-3 border-top border-secondary">

            <a href="https://github.com/Raiko1982/" target="_blank" class="github-link">
                <svg class="github-icon" height="16" viewBox="0 0 16 16" width="16">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
                <span>Raiko1982</span>
            </a>

        </div>
    </aside>
    <div id="map-container" style="position: relative;">

    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button id="btn-view-map" class="btn btn-primary d-flex align-items-center gap-2 shadow" onclick="switchView('map')">
            <i class="bi bi-map-fill"></i> 
            <span>Mapa</span>
        </button>
        <button id="btn-view-table" class="btn btn-light d-flex align-items-center gap-2 shadow" onclick="switchView('table')">
            <i class="bi bi-layout-three-columns"></i> 
            <span>Tabla</span>
        </button>
    </div>

        <div id="map" style="height: 100vh; width: 100%;"></div>

        <div id="table-view" class="d-none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; overflow-y: auto; padding: 80px 20px 20px 20px; background: #d4dadc;">
            <div class="table-responsive">
            <div class="card border-secondary">
                <table class="table table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Origen</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                            <th>Torneo</th>
                             <th>Ritmo</th>
                            <th>Organizador</th>
                            <th>Ciudad</th>                            
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        
                    </tbody>
                </table>
            </div>
            </div>
        </div>

    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="./main.js"></script>

</body>

</html>
